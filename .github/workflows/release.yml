name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'AI ArtStation ${{ github.ref_name }}'
          body: 'See the assets to download this version and install.'
          draft: true
          prerelease: false

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest  # arm64 (Apple Silicon)
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
          - platform: windows-latest
            args: ''
            target: ''
          - platform: ubuntu-22.04
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libavdevice-dev pkg-config

      - name: Install FFmpeg (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install ffmpeg pkg-config

      - name: Install FFmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          $VCINSTALLDIR = $(& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath)
          Add-Content $env:GITHUB_ENV "LIBCLANG_PATH=${VCINSTALLDIR}\VC\Tools\LLVM\x64\bin`n"
          Invoke-WebRequest "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-full-shared.7z" -OutFile ffmpeg.7z
          7z x ffmpeg.7z
          mkdir ffmpeg-install -Force
          mv ffmpeg-*-full_build-shared/* ffmpeg-install/
          $ffmpegDir = "${pwd}\ffmpeg-install"
          Add-Content $env:GITHUB_ENV "FFMPEG_DIR=${ffmpegDir}`n"
          Add-Content $env:GITHUB_PATH "${ffmpegDir}\bin`n"
          # Disable pkg-config for ffmpeg-sys-next on Windows
          Add-Content $env:GITHUB_ENV "LIBAVUTIL_NO_PKG_CONFIG=1`n"
          Add-Content $env:GITHUB_ENV "LIBAVCODEC_NO_PKG_CONFIG=1`n"
          Add-Content $env:GITHUB_ENV "LIBAVFORMAT_NO_PKG_CONFIG=1`n"
          Add-Content $env:GITHUB_ENV "LIBAVFILTER_NO_PKG_CONFIG=1`n"
          Add-Content $env:GITHUB_ENV "LIBAVDEVICE_NO_PKG_CONFIG=1`n"
          Add-Content $env:GITHUB_ENV "LIBSWSCALE_NO_PKG_CONFIG=1`n"
          Add-Content $env:GITHUB_ENV "LIBSWRESAMPLE_NO_PKG_CONFIG=1`n"
        shell: pwsh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
