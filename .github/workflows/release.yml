name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'AI ArtStation ${{ github.ref_name }}'
          body: 'See the assets to download this version and install.'
          draft: true
          prerelease: false

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest  # arm64 (Apple Silicon)
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
          - platform: windows-latest
            args: ''
            target: ''
          - platform: ubuntu-22.04
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            nasm pkg-config clang

      - name: Install build tools (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install nasm pkg-config

      - name: Setup Windows build environment
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Get Visual Studio installation path
          $VCINSTALLDIR = $(& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath)
          Write-Host "Visual Studio path: $VCINSTALLDIR"

          # Set LIBCLANG_PATH for bindgen
          Add-Content $env:GITHUB_ENV "LIBCLANG_PATH=${VCINSTALLDIR}\VC\Tools\LLVM\x64\bin`n"

          # Install make via chocolatey (Git Bash doesn't include make)
          choco install make -y --no-progress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Build the app (Windows)
        if: matrix.platform == 'windows-latest'
        shell: cmd
        run: |
          @echo off
          REM Setup MSVC environment first
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"

          REM Remove Git's link.exe from PATH to avoid conflict with MSVC's link.exe
          REM Git's usr/bin has a Unix link command that conflicts with MSVC linker
          if exist "C:\Program Files\Git\usr\bin\link.exe" (
            rename "C:\Program Files\Git\usr\bin\link.exe" "link_git.exe"
          )

          REM Use Git Bash's sh.exe (better Windows path handling than MSYS2)
          REM Git is pre-installed on Windows runners
          set "PATH=C:\Program Files\Git\bin;C:\Program Files\Git\usr\bin;%PATH%"

          REM Set compilers for FFmpeg
          set CC=cl
          set CXX=cl

          REM Verify tools
          echo === Tool locations ===
          where sh
          where make
          where link
          where cl
          echo === Environment check ===
          echo INCLUDE=%INCLUDE%
          echo LIB=%LIB%
          echo =====================

          REM Build
          bun run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the app (Unix)
        if: matrix.platform != 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
